<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReVIP{% block titulo %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro:   #0a0a0a;
      --dorado:  #c9a84c;
      --dorado2: #e8c97e;
      --crema:   #f5f0e8;
      --gris:    #2a2a2a;
      --rojo:    #c0392b;
      --verde:   #27ae60;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--negro);
      color: var(--crema);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid #1e1e1e;
      background: rgba(10,10,10,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dorado);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .nav-logo span { color: var(--crema); }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--dorado); }

    /* ── MAIN ── */
    main { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }

    /* ── FLASH ── */
    .flash {
      padding: 1rem 1.4rem;
      border-radius: 6px;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .flash.exito  { background: rgba(39,174,96,0.15);  border: 1px solid var(--verde); color: #6fcf97; }
    .flash.error  { background: rgba(192,57,43,0.15);  border: 1px solid var(--rojo);  color: #e57373; }

    /* ── HEADINGS ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--dorado);
      margin-bottom: 0.4rem;
    }

    .subtitulo {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.03em;
    }

    /* ── FORMULARIO ── */
    .form-card {
      background: var(--gris);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 2.2rem;
    }

    .campo { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 0.5rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: var(--crema);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--dorado);
    }

    textarea { resize: vertical; min-height: 90px; }

    .fila-doble {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    /* ── BOTONES ── */
    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-dorado { background: var(--dorado); color: var(--negro); }
    .btn-borde  { background: transparent; border: 1px solid #444; color: #aaa; }

    .acciones { display: flex; gap: 1rem; align-items: center; margin-top: 1.8rem; }

    /* ── TABLA ── */
    .tabla-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 0.8rem 1rem;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #777;
      border-bottom: 1px solid #2a2a2a;
    }

    tbody tr { border-bottom: 1px solid #1c1c1c; transition: background 0.15s; }
    tbody tr:hover { background: #151515; }
    tbody td { padding: 0.9rem 1rem; color: #ccc; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-dorado { background: rgba(201,168,76,0.15); color: var(--dorado2); border: 1px solid rgba(201,168,76,0.3); }
    .badge-verde  { background: rgba(39,174,96,0.12);  color: #6fcf97;        border: 1px solid rgba(39,174,96,0.3); }

    /* ── VACIO ── */
    .vacio {
      text-align: center;
      padding: 4rem 2rem;
      color: #555;
    }
    .vacio p { margin-bottom: 1.5rem; font-size: 0.95rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Re<span>VIP</span></a>
    <ul>
      <li><a href="/establecimientos">Establecimientos</a></li>
      <li><a href="/registrar-establecimiento">Registrar</a></li>
      <li><a href="/reservar">Reservar</a></li>
      <li><a href="/reservaciones">Mis Reservas</a></li>
    </ul>
  </nav>

  <main>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% block contenido %}{% endblock %}
  </main>
</body>
</html>
