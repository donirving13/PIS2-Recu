{% extends "base.html" %}
{% block titulo %} — Realizar Reservación{% endblock %}

{% block contenido %}
<h1>Realizar Reservación</h1>

{% if not establecimientos %}
<div class="vacio">
  <p>No hay establecimientos disponibles para reservar.</p>
  <a href="/registrar-establecimiento" class="btn btn-dorado">Registrar uno</a>
</div>
{% else %}
<div class="form-card">
  <form method="POST">

    <div class="fila-doble">
      <div class="campo">
        <label for="cliente_id">Cliente</label>
        <select id="cliente_id" name="cliente_id" required>
          <option value="" disabled selected>Selecciona un cliente…</option>
          {% for c in clientes %}
          <option value="{{ c.id }}">
            {{ c.nombre }} — Score: {{ c.trust_score }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="campo">
        <label for="establecimiento">Establecimiento</label>
        <select id="establecimiento" name="establecimiento" required>
          <option value="" disabled selected>Selecciona un lugar…</option>
          {% for e in establecimientos %}
          <option value="{{ e.nombre }}">
            {{ e.nombre }} (mín. {{ e.umbral_trust }})
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" required>
      </div>

      <div class="campo">
        <label for="hora">Hora</label>
        <input type="time" id="hora" name="hora" required>
      </div>
    </div>

    <div class="campo">
      <label for="personas">Número de personas</label>
      <input type="number" id="personas" name="personas" min="1" max="20" placeholder="Ej. 2" required>
    </div>

    <div class="acciones">
      <button type="submit" class="btn btn-dorado">
        Solicitar reservación
      </button>
      <a href="/reservaciones" class="btn btn-borde">
        Ver mis reservas
      </a>
    </div>

  </form>
</div>
{% endif %}
{% endblock %}
